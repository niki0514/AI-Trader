pipeline:
  mode: single_day
  timezone: Asia/Shanghai
  preset: full

market_data:
  provider: wind
  wind:
    history_lookback_days: 120
    min_history_days: 30
    prefer_source_prices: true
    connect_timeout_seconds: 10

stock_screen:
  endpoint: https://mkapi2.dfcfs.com/finskillshub/api/claw/stock-screen
  api_key_env: MX_APIKEY
  timeout_seconds: 20
  default_page_size: 100
  fetch_all_pages: true
  max_pages: 200

news_search:
  enabled: true
  endpoint: https://mkapi2.dfcfs.com/finskillshub/api/claw/news-search
  api_key_env: MX_APIKEY
  timeout_seconds: 20
  default_size: 12

selection:
  top_n: 6
  tech_score_floor: 0.64
  liquidity_score_floor: 0.50
  momentum_weight: 0.30
  breakout_weight: 0.20
  liquidity_weight: 0.15

holding:
  stop_loss_pct: 0.08
  take_profit_pct: 0.15
  adverse_event_exit_score: 0.20
  reduce_to_weight_factor: 0.60

weights:
  base_w: 0.06

decision:
  build_score_floor: 0.70
  add_score_floor: 0.74
  entry_buffer_bps: 8
  regime_factors:
    risk_on: 1.10
    neutral: 1.00
    risk_off: 0.75

risk:
  default_mode: NEUTRAL
  mode_caps:
    risk_on: 0.70
    neutral: 0.50
    risk_off: 0.30

risk_rules:
  single_stock_cap:
    enabled: true
    value: 0.12
  industry_cap:
    enabled: true
    value: 0.25
  liquidity_cap:
    enabled: true
    value: 0.10
  t_plus_one:
    enabled: true
  drawdown_guard:
    enabled: true
    block_build_add_pct: 0.10
    cap_multiplier: 0.70

execution:
  venue: paper
  order_type: market
  slippage_bps: 8
  allow_fractional_shares: false

a_share:
  trading:
    default_lot_size: 100
    price_tick: 0.01
    lot_size_by_board:
      main: 100
      chinext: 100
      star: 100
      bse: 100
  boards:
    main_price_limit_pct: 0.10
    main_risk_warning_price_limit_pct: 0.05
    chinext_price_limit_pct: 0.20
    star_price_limit_pct: 0.20
    bse_price_limit_pct: 0.30
    new_listing_unlimited_days:
      main: 5
      chinext: 5
      star: 5
      bse: 1
  fees:
    commission_rate: 0.0003
    min_commission: 5.0
    stamp_duty_rate_sell: 0.0005
    transfer_fee_rate: 0.00001
  selection:
    min_turnover_rate: 0.02
    preferred_turnover_rate: 0.06
    min_relative_volume: 1.0
    min_amount: 300000000
    turnover_weight: 0.15
    relative_volume_weight: 0.10
    amount_weight: 0.10
    near_limit_up_guard_pct: 0.985
    near_limit_up_penalty: 0.18
  position:
    board_risk_factors:
      main: 1.00
      chinext: 0.90
      star: 0.85
      bse: 0.70
  risk:
    buy_reject_if_st: true
    buy_reject_if_suspended: true
    buy_reject_if_limit_up: true
    min_listing_days: 60
    min_amount: 300000000
    min_turnover_rate: 0.015
    board_caps:
      main: 0.50
      chinext: 0.20
      star: 0.15
      bse: 0.08

llm:
  provider: gmn
  endpoint: https://gmn.chuangzuoli.com/v1/responses
  api_key_env: GMN_API_KEY
  user_agent: codex-rs/1.0.7
  model: gpt-5.4
  temperature: 0.20
  max_output_tokens: 512
  timeout_seconds: 20
  enable_live: true

degrade:
  disable_selector: false
  disable_executor: false
